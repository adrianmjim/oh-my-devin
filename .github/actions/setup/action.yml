name: Setup
description: Install pnpm and Node.js with the pnpm store cache, then install dependencies.

inputs:
  node-version:
    description: Node.js version to install.
    default: '24'

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6.0.9
    - uses: actions/setup-node@v7.0.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: package.json
    - run: pnpm install
      shell: bash

name: Setup
description: Install Node.js with the npm cache and run npm ci.

inputs:
  node-version:
    description: Node.js version to install.
    default: '24'

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v7.0.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
    - run: npm ci
      shell: bash
